name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  shell:
    name: Shell greeter tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bash test suite
        run: bash test.sh

  python:
    name: Python greeter tests
    runs-on: ubuntu-latest
    # Only run when greet.py is present (added by feature/python-version)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check for Python greeter
        id: check
        run: |
          if [ -f greet.py ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install dependencies
        if: steps.check.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then pip install -e ".[test]"; fi
      - name: Run pytest suite
        if: steps.check.outputs.present == 'true'
        run: pytest test_greet.py -v
      - name: Skip (no greet.py on this branch)
        if: steps.check.outputs.present == 'false'
        run: echo "greet.py not present on this branch — skipping Python tests"
